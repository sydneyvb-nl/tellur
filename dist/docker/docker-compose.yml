# Example Compose file for self-hosting the Tellur team hub.
# Run from this directory:  docker compose up --build
#
# Bootstrap (in another shell) once it's running:
#   docker compose exec tellur-hub tellur-server admin create-org --name "Acme"
#   docker compose exec tellur-hub tellur-server admin create-token --org <id> --role admin
#
# For production, front this with a TLS-terminating reverse proxy.
#
# Storage backend:
#   - Default (this file): embedded SQLite on the tellur-data volume — zero-config,
#     single-node.
#   - Horizontal scale: set TELLUR_DATABASE_URL to a Postgres connection string
#     and uncomment the `postgres` service + `depends_on` below. The server talks
#     to Postgres over NoTls, so keep it on a private network / behind a proxy.

services:
  tellur-hub:
    build:
      context: ../..
      dockerfile: dist/docker/Dockerfile
    image: tellur-server:dev
    ports:
      - "4920:4920"
    volumes:
      - tellur-data:/data
    environment:
      TELLUR_SERVER_BIND: "0.0.0.0:4920"
      TELLUR_SERVER_ALLOW_NON_LOOPBACK: "1"
      # Uncomment to use the Postgres backend instead of SQLite:
      # TELLUR_DATABASE_URL: "postgres://tellur:tellur@postgres:5432/tellur"
      # Uncomment to enable OIDC SSO (all four required). Provision who may sign
      # in with `tellur-server admin add-member --email ...`. Keep the client
      # secret in a secret store, and serve the hub over HTTPS (Secure cookie).
      # TELLUR_OIDC_ISSUER: "https://idp.example.com"
      # TELLUR_OIDC_CLIENT_ID: "tellur-hub"
      # TELLUR_OIDC_CLIENT_SECRET: "change-me"
      # TELLUR_OIDC_REDIRECT_URI: "https://hub.example.com/auth/callback"
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    restart: unless-stopped

  # Uncomment to run a Postgres backend alongside the hub.
  # postgres:
  #   image: postgres:16
  #   environment:
  #     POSTGRES_USER: tellur
  #     POSTGRES_PASSWORD: tellur
  #     POSTGRES_DB: tellur
  #   volumes:
  #     - tellur-pg:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U tellur"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

volumes:
  tellur-data:
  # tellur-pg:
