# Example GitHub Actions workflow: post `tellur team report` on every PR.
#
# Copy this file to `.github/workflows/tellur-team-report.yml` in your repo.
#
# It aggregates the `refs/notes/ai` authorship notes of the commits in the PR
# range into one AI-involvement comment — no Tellur server required (this is the
# Tier 0 / Git-native path). Contributors publish their notes with
# `tellur notes push`; this workflow fetches them and rolls them up.
#
# Security: branch-controlled values (base ref) are passed through the
# environment and never interpolated into the shell, so a malicious branch name
# cannot inject commands.

name: Tellur Team Report

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  team-report:
    runs-on: ubuntu-latest
    name: Tellur Team AI-Involvement Report
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git rev-list base..head` can walk the PR range.
          fetch-depth: 0

      - name: Install Tellur
        run: |
          set -euo pipefail
          url="https://github.com/sydneyvb-nl/tellur/releases/latest/download/tellur-linux-x64.tar.gz"
          if curl -fsSL "$url" -o tellur.tar.gz; then
            tar xzf tellur.tar.gz
            sudo install -m 0755 tellur /usr/local/bin/tellur
            tellur --version
          else
            echo "Tellur not yet released — skipping team report." >&2
            echo "skip=true" >> "$GITHUB_ENV"
          fi

      - name: Fetch AI authorship notes
        if: ${{ env.skip != 'true' }}
        run: |
          # Notes are not fetched by default; pull them if any contributor pushed.
          git fetch origin "refs/notes/ai:refs/notes/ai" || \
            echo "No refs/notes/ai on origin yet — report will show 'without provenance'."

      - name: Generate team report
        if: ${{ env.skip != 'true' }}
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          tellur team report --base "origin/$BASE_REF" --head HEAD > team-report.md || \
            echo "_Tellur team report could not be generated._" > team-report.md

      - name: Comment PR
        if: ${{ env.skip != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- tellur-team-report -->';
            let report = '_No team report available._';
            try { report = fs.readFileSync('team-report.md', 'utf8'); } catch {}
            const body = `${marker}\n${report}\n\n---\n_Generated by [Tellur](https://github.com/sydneyvb-nl/tellur)_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
