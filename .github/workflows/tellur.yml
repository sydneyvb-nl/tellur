name: Tellur PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  report:
    runs-on: ubuntu-latest
    name: Generate Tellur Provenance Report
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Tellur
        run: |
          set -euo pipefail
          # Use the checked-out code, not a floating external release, so the
          # PR check is reproducible for this commit.
          cargo build --release --bin tellur
          sudo install -m 0755 target/release/tellur /usr/local/bin/tellur
          tellur --version

      - name: Fetch AI authorship notes
        run: |
          # A CI checkout never contains a developer's local SQLite index.
          # Git notes are the portable, commit-scoped provenance transport.
          git fetch origin "+refs/notes/ai:refs/notes/ai" || \
            echo "No refs/notes/ai found; changed lines will be reported as unknown."

      - name: Generate PR provenance report
        # Pass refs via the environment (never interpolate ${{ }} into the shell)
        # so a malicious branch name cannot inject commands. See SEC-1.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          tellur team report --base "$BASE_SHA" --head "$HEAD_SHA" > pr-report.md

      - name: Upload PR report
        uses: actions/upload-artifact@v4
        with:
          name: tellur-pr-report
          path: |
            pr-report.md
          if-no-files-found: error

  comment:
    runs-on: ubuntu-latest
    name: Comment Tellur Provenance Report
    needs: report
    permissions:
      actions: read
      pull-requests: write
    steps:
      - name: Download PR report
        uses: actions/download-artifact@v4
        with:
          name: tellur-pr-report
          path: tellur-report
        continue-on-error: true

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- tellur-pr-provenance -->';
            let body = `${marker}\n## 🔍 Tellur PR Provenance Check\n\n`;
            try {
              const report = fs.readFileSync('tellur-report/pr-report.md', 'utf8');
              body += report;
            } catch {
              body += '> ⚠️ **The provenance report could not be generated.** Do not interpret this as 0% AI involvement.\n';
            }
            body += '\n---\n_Generated by [Tellur](https://github.com/sydneyvb-nl/tellur)_';

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && (c.body.includes(marker) || c.body.includes('Tellur PR Provenance Check')));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
