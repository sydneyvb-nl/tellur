name: Tellur PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  report:
    runs-on: ubuntu-latest
    name: Generate Tellur Provenance Report
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Tellur
        run: |
          set -euo pipefail
          # Use the checked-out code, not a floating external release, so the
          # PR check is reproducible for this commit.
          cargo build --release --bin tellur
          sudo install -m 0755 target/release/tellur /usr/local/bin/tellur
          tellur --version

      - name: Check for Tellur config
        id: check
        run: |
          if [ "${skip:-false}" = "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [ -d ".tellur" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No .tellur directory found. Skipping provenance check."
          fi

      - name: Generate PR Report
        if: steps.check.outputs.enabled == 'true'
        # Pass refs via the environment (never interpolate ${{ }} into the shell)
        # so a malicious branch name cannot inject commands. See SEC-1.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          tellur pr-report --base "$BASE_SHA" --head "$HEAD_SHA" > pr-report.md
          tellur policy check > policy-check.txt 2>&1 || true

      - name: Upload PR report
        uses: actions/upload-artifact@v4
        with:
          name: tellur-pr-report
          path: |
            pr-report.md
            policy-check.txt
          if-no-files-found: ignore

  comment:
    runs-on: ubuntu-latest
    name: Comment Tellur Provenance Report
    needs: report
    permissions:
      actions: read
      pull-requests: write
    steps:
      - name: Download PR report
        uses: actions/download-artifact@v4
        with:
          name: tellur-pr-report
          path: tellur-report
        continue-on-error: true

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔍 Tellur PR Provenance Check\n\n';
            try {
              const report = fs.readFileSync('tellur-report/pr-report.md', 'utf8');
              body += report;
            } catch {
              body += '_No provenance data available yet. Run `tellur watch` locally to start capturing._\n';
            }
            body += '\n---\n_Generated by [Tellur](https://github.com/sydneyvb-nl/tellur)_';

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Tellur PR Provenance Check'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
