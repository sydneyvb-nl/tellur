name: Tellur PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  tellur:
    runs-on: ubuntu-latest
    name: Tellur Provenance Check
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Tellur
        run: |
          set -euo pipefail
          # Download the linux x64 release tarball (CI runner is x64) and extract.
          url="https://github.com/sydneyvb-nl/tellur/releases/latest/download/tellur-linux-x64.tar.gz"
          if curl -fsSL "$url" -o tellur.tar.gz; then
            tar xzf tellur.tar.gz
            sudo install -m 0755 tellur /usr/local/bin/tellur
            tellur --version
          else
            echo "Tellur not yet released — skipping provenance check." >&2
            echo "skip=true" >> "$GITHUB_ENV"
          fi

      - name: Check for Tellur config
        id: check
        run: |
          if [ "${skip:-false}" = "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [ -d ".tellur" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No .tellur directory found. Skipping provenance check."
          fi

      - name: Generate PR Report
        if: steps.check.outputs.enabled == 'true'
        # Pass refs via the environment (never interpolate ${{ }} into the shell)
        # so a malicious branch name cannot inject commands. See SEC-1.
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          tellur pr-report --base "origin/$BASE_REF" --head "origin/$HEAD_REF" > pr-report.md
          tellur policy check > policy-check.txt 2>&1 || true

      - name: Comment PR
        if: steps.check.outputs.enabled == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔍 Tellur PR Provenance Check\n\n';
            try {
              const report = fs.readFileSync('pr-report.md', 'utf8');
              body += report;
            } catch {
              body += '_No provenance data available yet. Run `tellur watch` locally to start capturing._\n';
            }
            body += '\n---\n_Generated by [Tellur](https://github.com/sydneyvb-nl/tellur)_';

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Tellur PR Provenance Check'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
