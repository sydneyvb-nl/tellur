name: TraceGit PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  tracelens:
    runs-on: ubuntu-latest
    name: TraceGit Provenance Check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install TraceGit
        run: |
          curl -sL https://github.com/sydneyvb-nl/TraceGit/releases/latest/download/tracegit-linux-arm64 -o /usr/local/bin/tracegit
          chmod +x /usr/local/bin/tracegit
          tracegit --version || echo "TraceGit not yet released — skipping"

      - name: Check for TraceGit config
        id: check
        run: |
          if [ -d ".tracegit" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No .tracegit directory found. Skipping provenance check."
          fi

      - name: Generate PR Report
        if: steps.check.outputs.enabled == 'true'
        run: |
          tracegit pr-report --base origin/${{ github.base_ref }} --head origin/${{ github.head_ref }} > pr-report.md
          tracegit policy check > policy-check.txt 2>&1 || true

      - name: Comment PR
        if: steps.check.outputs.enabled == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔍 TraceGit PR Provenance Check\n\n';
            try {
              const report = fs.readFileSync('pr-report.md', 'utf8');
              body += report;
            } catch {
              body += '_No provenance data available yet. Run `tracegit watch` locally to start capturing._\n';
            }
            body += '\n---\n_Generated by [TraceGit](https://github.com/sydneyvb-nl/TraceGit)_';

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('TraceGit PR Provenance Check'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
