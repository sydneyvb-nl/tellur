name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    # Postgres backend integration tests (crates/server/tests/postgres.rs) run
    # against this disposable service; they reset the schema, so it must stay a
    # throwaway DB. Without TELLUR_TEST_DATABASE_URL those tests no-op.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tellur_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TELLUR_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/tellur_test
    steps:
      - uses: actions/checkout@v5
      # Toolchain version is pinned in rust-toolchain.toml so CI and local stay
      # in lockstep; the components are installed for the pinned toolchain.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  dashboard:
    name: dashboard (web build + embed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: crates/server/ui/pnpm-lock.yaml
      # Build + typecheck + unit-test the SPA.
      - run: pnpm install --frozen-lockfile
        working-directory: crates/server/ui
      - run: pnpm check
        working-directory: crates/server/ui
      - run: pnpm test
        working-directory: crates/server/ui
      - run: pnpm build
        working-directory: crates/server/ui
      # Exercise the embed path: the hub compiles with the real assets in
      # ui/dist (rust-embed reads them at compile time).
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p tellur-server --features dashboard

  e2e:
    name: dashboard E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: crates/server/ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: crates/server/ui
      - run: pnpm exec playwright install --with-deps chromium
        working-directory: crates/server/ui
      # Drives the real production bundle in Chromium against a mocked /v1 API;
      # the Playwright webServer config builds + previews the SPA first.
      - run: pnpm e2e
        working-directory: crates/server/ui

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # cargo-deny's `advisories` check uses the same RustSec database as
      # cargo-audit, so it also covers vulnerability scanning (no separate audit
      # step needed).
      - name: cargo-deny (licenses + advisories + sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  editor-packages:
    name: editor release packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editor/tellur-vscode/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Validate installers
        run: |
          bash -n install.sh
          bash dist/tests/install-sh-e2e.sh
          pwsh -NoProfile -Command '$null = [scriptblock]::Create((Get-Content -Raw install.ps1))'
      - name: Build VS Code-compatible VSIX
        working-directory: editor/tellur-vscode
        run: |
          npm ci
          npm run test:unit
          npx vsce package --no-dependencies --out ../../tellur-vscode.vsix
          test -s ../../tellur-vscode.vsix
      - name: Build JetBrains plugin ZIP
        working-directory: editor/tellur-jetbrains
        run: |
          ./gradlew buildPlugin
          cp build/distributions/*.zip ../../tellur-jetbrains.zip
          test -s ../../tellur-jetbrains.zip

  windows-installer:
    name: Windows installer E2E
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p tellur-cli --bin tellur
      - run: ./dist/tests/install-ps1-e2e.ps1
        shell: pwsh

  release-linux-binaries:
    name: release binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install target linker
        run: |
          sudo apt-get update
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            sudo apt-get install -y musl-tools
          else
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi
      - name: Build release CLI
        run: cargo build --release --target "${{ matrix.target }}" -p tellur-cli --bin tellur
      - name: Package and verify archive
        run: |
          cp "target/${{ matrix.target }}/release/tellur" tellur
          chmod +x tellur
          tar czf tellur-linux.tar.gz tellur
          test -s tellur-linux.tar.gz
          sha256sum tellur-linux.tar.gz > tellur-linux.tar.gz.sha256
          sha256sum --check tellur-linux.tar.gz.sha256

  docker:
    name: build tellur-server image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Verify the hub container image builds (build-only, no push).
      - run: docker build -f dist/docker/Dockerfile -t tellur-server:ci .
