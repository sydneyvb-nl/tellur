name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    # Postgres backend integration tests (crates/server/tests/postgres.rs) run
    # against this disposable service; they reset the schema, so it must stay a
    # throwaway DB. Without TELLUR_TEST_DATABASE_URL those tests no-op.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tellur_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TELLUR_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/tellur_test
    steps:
      - uses: actions/checkout@v5
      # Toolchain version is pinned in rust-toolchain.toml so CI and local stay
      # in lockstep; the components are installed for the pinned toolchain.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  dashboard:
    name: dashboard (web build + embed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: crates/server/ui/pnpm-lock.yaml
      # Build + typecheck + unit-test the SPA.
      - run: pnpm install --frozen-lockfile
        working-directory: crates/server/ui
      - run: pnpm check
        working-directory: crates/server/ui
      - run: pnpm test
        working-directory: crates/server/ui
      - run: pnpm build
        working-directory: crates/server/ui
      # Exercise the embed path: the hub compiles with the real assets in
      # ui/dist (rust-embed reads them at compile time).
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p tellur-server --features dashboard

  e2e:
    name: dashboard E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: crates/server/ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: crates/server/ui
      - run: pnpm exec playwright install --with-deps chromium
        working-directory: crates/server/ui
      # Drives the real production bundle in Chromium against a mocked /v1 API;
      # the Playwright webServer config builds + previews the SPA first.
      - run: pnpm e2e
        working-directory: crates/server/ui

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # cargo-deny's `advisories` check uses the same RustSec database as
      # cargo-audit, so it also covers vulnerability scanning (no separate audit
      # step needed).
      - name: cargo-deny (licenses + advisories + sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  docker:
    name: build tellur-server image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Verify the hub container image builds (build-only, no push).
      - run: docker build -f dist/docker/Dockerfile -t tellur-server:ci .
