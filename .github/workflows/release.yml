name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: tellur-mac-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: tellur-mac-x64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: tellur-linux-x64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: tellur-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: tellur-windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install pinned Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          # Archive contains a canonical `tellur` binary so the installer
          # doesn't need per-platform inner names.
          cp target/${{ matrix.target }}/release/tellur tellur
          chmod +x tellur
          tar czf ${{ matrix.name }}.tar.gz tellur
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/tellur.exe tellur.exe
          7z a ${{ matrix.name }}.zip tellur.exe
          (Get-FileHash -Algorithm SHA256 "${{ matrix.name }}.zip").Hash.ToLower() | Out-File -Encoding ascii "${{ matrix.name }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256
            ${{ matrix.name }}.zip
            ${{ matrix.name }}.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
