name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: tellur-mac-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: tellur-mac-x64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: tellur-linux-x64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: tellur-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: tellur-windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install pinned Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p tellur-cli --bin tellur

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          # Archive contains a canonical `tellur` binary so the installer
          # doesn't need per-platform inner names.
          cp target/${{ matrix.target }}/release/tellur tellur
          chmod +x tellur
          tar czf ${{ matrix.name }}.tar.gz tellur
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/tellur.exe tellur.exe
          7z a ${{ matrix.name }}.zip tellur.exe
          (Get-FileHash -Algorithm SHA256 "${{ matrix.name }}.zip").Hash.ToLower() | Out-File -Encoding ascii "${{ matrix.name }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256
            ${{ matrix.name }}.zip
            ${{ matrix.name }}.zip.sha256

  editors:
    name: Build editor release packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editor/tellur-vscode/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Build VS Code-compatible VSIX
        working-directory: editor/tellur-vscode
        run: |
          npm ci
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
          npm run test:unit
          npx vsce package --no-dependencies --out ../../tellur-vscode.vsix
      - name: Build JetBrains plugin ZIP
        working-directory: editor/tellur-jetbrains
        run: |
          ./gradlew -PpluginVersion="${GITHUB_REF_NAME#v}" buildPlugin
          cp build/distributions/*.zip ../../tellur-jetbrains.zip
      - name: Create editor package checksums
        run: |
          sha256sum tellur-vscode.vsix > tellur-vscode.vsix.sha256
          sha256sum tellur-jetbrains.zip > tellur-jetbrains.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: tellur-editor-packages
          path: |
            tellur-vscode.vsix
            tellur-vscode.vsix.sha256
            tellur-jetbrains.zip
            tellur-jetbrains.zip.sha256

  release:
    needs: [build, editors]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            artifacts/**/*
            install.sh
            install.ps1
          generate_release_notes: true
