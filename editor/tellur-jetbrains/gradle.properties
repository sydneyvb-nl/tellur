# Tellur JetBrains plugin build properties
pluginGroup=dev.tellur.jetbrains
pluginVersion=0.1.0

# Minimum/target IntelliJ Platform. 2024.1 (build 241) covers current
# IntelliJ-family IDEs (IDEA, PyCharm, WebStorm, GoLand, RubyMine, ...).
platformType=IC
platformVersion=2024.1
pluginSinceBuild=241
pluginUntilBuild=242.*

org.gradle.jvmargs=-Xmx2g
org.gradle.caching=true
kotlin.stdlib.default.dependency=false
