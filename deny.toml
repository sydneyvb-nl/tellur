# cargo-deny configuration — supply-chain security gate (run in CI).
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
# RUSTSEC advisories: vulnerabilities and yanked crates fail the build.
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
# Permissive licenses allowed for dependencies. Tellur's own crates are either
# Apache-2.0 (core/cli/adapters) or FSL (server, marked publish=false → ignored).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # Permissive data license used by webpki-roots (TLS trust anchors pulled in
    # by ureq/rustls for OIDC HTTPS).
    "CDLA-Permissive-2.0",
]

[licenses.private]
# Skip first-party unpublished crates (e.g. the FSL-licensed tellur-server).
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
